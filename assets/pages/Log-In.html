<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/styles/Log-In.css">
</head>
<body>
     <div class="container">
        <div class="image-section">
            <img src="/assets/images/WMSU-SHS.jpg" alt="University Building" id="hero-img">
        </div>

        <div class="form-section">
            <div>
                <img src="/assets/images/684271049_1441984574282179_3467844199188568396_n.png" alt="Logo" id="Logo">
            </div>

        
            <form action="" id="registrationForm">
                <div class="header">
                <h1>Welcome Back !</h1>
                <p>log In To Your Account</p>
                 </div>


                <div class="input-group">
                    <label>School Email</label>
                    <input type="text" placeholder="e.g ty2025...@student.wmsu.edu.ph" required>
                </div>

               <div class="input-group">
                    <label>Password</label>
                    <input type="password" placeholder="" required>
                </div>
                <div>
                    <input id="ForgotPass" type="checkbox">
                    <span>Forgot Password?</span> 
                </div>

                <div class="actions" id="InputPass">
                    <button type="submit" class="next-btn">Next</button>
                </div>
            </form>

            <div class="footer">
                <span>Don't Have Account? <a href="Create-acc.html">Sign Up</a></span>
                <form action="/index.html"><button id="bckbtn" class="back-btn">↩</button></form>
            </div>
        </div>
    </div>

    <script src="/assets/Javascripts/login.js"></script>
</body>
</html>
