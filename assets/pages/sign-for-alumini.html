<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration alumni</title>
    <link rel="stylesheet" href="/assets/styles/Create-acc-2nd-page.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="/assets/images/WMSU-SHS.jpg" alt="University Building" id="hero-img">
        </div>

        <div class="form-section">
            <div>
                <img src="/assets/images/684271049_1441984574282179_3467844199188568396_n.png" alt="Logo" id="Logo">
            </div>
            <div class="header">
                <h1>Welcome !</h1>
                <p>Create An Account</p>
            </div>

            <form action="Emergency-contact-page.html" id="registrationForm">
                <div class="input-group">
                    <label>Department</label>
                    <input type="text" placeholder="College of Medecine " required>
                </div>

                <div class="input-group">
                    <label>Course Graduated</label>
                    <input type="text" placeholder="Medecine" required>
                </div> 

                <div class="input-group">
                    <label>Batch Yeear</label>
                    <input type="text" placeholder="2016-2017" required>
                </div> 

                <div class="input-group">
                    <label>Current Occupation</label>
                    <input type="text" placeholder="Dean" required>
                </div> 

                <div class="input-group">
                    <label>Personal Email</label>
                    <input type="text" placeholder="@..." required>
                </div> 

                


                <div class="actions">
                    <form action="Emergency-contact-page.html"><button type="submit" class="next-btn">Next</button></form>
                </div>
            </form>

            <div class="footer">
                <span style="font-size: small;">Already Have An Account? <a href="Log-In.html">Log In</a></span>
                <form action="Create-acc.html">
                    <button class="back-btn">↩</button>
                </form>
            </div>
        </div>
    </div>
    <script src="/assets/Javascripts/.js"></script>

</body>
</html>
