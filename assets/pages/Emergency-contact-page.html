<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Page3</title>
    <link rel="stylesheet" href="/assets/styles/Emergency-Number.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="/assets/images/WMSU-SHS.jpg" alt="University Building" id="hero-img">
        </div>

        <div class="form-section">
            <div>
                <img src="/assets/images/684271049_1441984574282179_3467844199188568396_n.png" alt="Logo" id="Logo">
            </div>
            <div class="header">
                <h1>Welcome !</h1>
                <p>Create An Account</p>
            </div>

            <form action="Verification-code.html" id="ContactForms">
                <div class="input-group">
                    <label>Mobile Number</label>
                    <input type="text" id="mobileNum" placeholder="63+ 000-0000-000" required>
                </div>
                
                 <div class="input-group">
                    <label>Emergency Contact Name</label>
                    <input type="text" id="contactName"  placeholder="First Name, Middle Initial, Surname" required>
                </div>

                <div class="input-group">
                    <label>Emergency Contact Number</label>
                    <input type="text" id="emergeNum" placeholder="63+ 000-0000-000" required>
                </div>

                <div class="actions">
                    <button type="submit" class="next-btn">Next</button>
                </div>
            </form>

            <div class="footer">
                <span>Already Have An Account? <a href="#">Log In</a></span>
                <form action="Signing-page.html">
                    <button class="back-btn">↩</button>
                </form>
            </div>
        </div>
    </div>
    <script src="/assets/Javascripts/Emergency.js"></script>
</body>
</html>
