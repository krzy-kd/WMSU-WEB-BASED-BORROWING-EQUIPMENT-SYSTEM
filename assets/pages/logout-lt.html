<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/assets/styles/logout-lt.css">
</head>
<body>
    <div class="container">
        <div class="image-section">
            <img src="/assets/images/WMSU-SHS.jpg" alt="University Building" id="hero-img">
        </div>

        <div class="form-section">
            <div>
                <img src="/assets/images/684271049_1441984574282179_3467844199188568396_n.png" alt="Logo" id="Logo">
            </div>

            <form id="loggedOut" action="" class="LogOut">    
            <div class="content-left">
            <h1 class="hero-title" style="font-weight: bold;">Log Out</h1>
            <p class="hero-text">
                Are You Sure You Want To Log Out?<br>
                You will Need To Log In Again To Use The System.
            </p>
            <div class="hero-buttons">
                <button type="button" class="btn btn-outline" id="cancelBtn">Cancel</button>
                <button id="logoutBtn" class="btn btn-outline">Log Out</button>   
            </div>
            </div>
            </form>
        </div>
    </div>
    <script src="/assets/Javascripts/loggedOut.js"></script>
</body>
</html>
